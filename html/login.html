<!-- ═══ LOGIN PAGE ═══ -->
<div class="page" id="page-login">
  <div class="auth-page">
    <div class="glass auth-card">
      <div class="auth-logo-top" style="justify-content:flex-start;margin-bottom:1.25rem;color:var(--navy)">
        <div class="icon" style="background:linear-gradient(135deg,var(--navy),var(--navy-light));color:var(--gold)">
          <i class="fas fa-shield-halved"></i>
        </div>
        <span style="font-size:1.3rem;color:var(--navy)">SafeZone</span>
      </div>
      <div class="auth-title">Welcome Back</div>
      <div class="auth-sub">Sign in to your SafeZone account.</div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email Address *</label>
          <div class="input-icon"><i class="fas fa-envelope"></i><input type="email" id="log-email" class="form-input" placeholder="you@example.com"></div>
          <div class="error-msg" id="err-log-email">Please enter a valid email address.</div>
        </div>
        <div class="form-group">
          <label class="form-label">Password *</label>
          <div class="input-icon" style="position:relative">
            <i class="fas fa-lock"></i>
            <input type="password" id="log-password" class="form-input" placeholder="Your password">
            <button type="button" class="pass-toggle" onclick="togglePass('log-password',this)"><i class="fas fa-eye"></i></button>
          </div>
          <div class="error-msg" id="err-log-password">Please enter your password.</div>
        </div>
        <div class="error-msg" id="err-log-general" style="margin-bottom:0.75rem">Invalid email or password.</div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center"><i class="fas fa-sign-in-alt"></i> Sign In</button>
      </form>
      <div class="auth-footer">Don't have an account? <a onclick="showPage('register')">Sign up free</a></div>
      <div style="text-align:center;margin-top:0.75rem">
        <a onclick="showPage('landing')" style="font-size:0.82rem;color:var(--text-muted);cursor:pointer;display:inline-flex;align-items:center;gap:0.35rem;text-decoration:none">
          <i class="fas fa-arrow-left" style="font-size:0.75rem"></i> Back to Home
        </a>
      </div>
    </div>
  </div>
</div>
